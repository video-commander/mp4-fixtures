name: release

# Generates the full fixture set and publishes it as a GitHub release asset.
# Consumers download a pinned fixtures-v* release so their test inputs stay
# byte-identical until they bump the tag on purpose.
#
# Cut a release with:
#   git tag fixtures-v1 && git push origin fixtures-v1
# Manual workflow_dispatch runs generate + verify only (no release), as a
# dry run for config changes.

on:
  push:
    tags: ["fixtures-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg + MP4Box
        # Ubuntu's apt ffmpeg is 6.1, which cannot write the mdcv/clli colour
        # boxes the HDR10/Dolby Vision recipes assert (the libx265 wrapper only
        # exports mastering-display/content-light as packet side data from
        # ffmpeg 7.x on). Use a static build pinned to an immutable BtbN
        # autobuild tag + sha256 so the fixture set stays byte-reproducible;
        # MP4Box (gpac) and zstd still come from apt. Bump BUILD/FF/SHA to update.
        run: |
          sudo apt-get update && sudo apt-get install -y zstd gpac
          FF=ffmpeg-n8.1.2-22-g94138f6973-linux64-gpl-8.1
          BUILD=autobuild-2026-07-15-14-01
          SHA=68e304f5518d3e22cd825e6fb738d0d9a04a8f36127873a18fc6646457e95b92
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/${BUILD}/${FF}.tar.xz" -o /tmp/ffmpeg.tar.xz
          echo "${SHA}  /tmp/ffmpeg.tar.xz" | sha256sum -c -
          sudo tar -xJf /tmp/ffmpeg.tar.xz --strip-components=2 -C /usr/local/bin "${FF}/bin/ffmpeg" "${FF}/bin/ffprobe"
          ffmpeg -version | head -1

      - name: Install dovi_tool
        # Dolby Vision fixtures need dovi_tool (RPU) + MP4Box (writes dvvC).
        # Pinned to keep the DV fixture byte-stable across runs; the hdr.sh
        # recipe skips the DV fixture cleanly if either tool is missing.
        run: |
          DOVI_VERSION=2.3.3
          curl -fsSL "https://github.com/quietvoid/dovi_tool/releases/download/${DOVI_VERSION}/dovi_tool-${DOVI_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          dovi_tool --version
          MP4Box -version 2>&1 | head -1

      - name: Generate fixtures
        run: |
          chmod +x generate.sh
          ./generate.sh

      - name: Verify fixture set
        # Strict, mirroring the smoke job: abort before publishing if any
        # fixture FAILED. Optional codecs log SKIP (e.g. aac_he needs libfdk_aac,
        # absent from this build) and are fine — a FAILED is a real error.
        run: |
          count=$(ls output/*.mp4 | wc -l)
          echo "generated $count fixtures"
          if grep -q "FAILED" output/generate.log; then
            echo "::error::a fixture failed to generate — refusing to publish"
            grep -nE "→ |FAILED" output/generate.log
            exit 1
          fi
          if [ "$count" -lt 45 ]; then
            echo "expected at least 45 fixtures, got $count" >&2
            exit 1
          fi
          echo "FIXTURE_COUNT=$count" >> "$GITHUB_ENV"

      - name: Package
        run: |
          tar --zstd --exclude=generate.log -cf "mp4-fixtures-${GITHUB_REF_NAME}.tar.zst" -C output .
          sha256sum mp4-fixtures-*.tar.zst | tee checksums.txt

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Fixture set: $FIXTURE_COUNT files, generated with $(ffmpeg -version | head -1 | cut -d' ' -f1-3) on ubuntu-latest." \
            "mp4-fixtures-${GITHUB_REF_NAME}.tar.zst" checksums.txt output/generate.log

      - name: Upload artifact (dry run)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v7
        with:
          name: mp4-fixtures-dry-run
          path: |
            mp4-fixtures-*.tar.zst
            output/generate.log
          retention-days: 7
