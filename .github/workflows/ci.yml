name: ci

# Fast pre-release smoke test: proves every recipe runs and produces a valid
# MP4, and that the HDR/colour fixtures carry the right signalling — before a
# release is ever cut. Uses fixtures.ci.toml (tiny resolution/duration), so the
# whole set generates in well under a minute. The full release-scale set is
# validated separately by release.yml (workflow_dispatch dry run, or on tag).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg + MP4Box
        # Ubuntu's apt ffmpeg is 6.1, which cannot write the mdcv/clli colour
        # boxes the HDR10/Dolby Vision recipes assert (the libx265 wrapper only
        # exports mastering-display/content-light as packet side data from
        # ffmpeg 7.x on). Use a static build pinned to an immutable BtbN
        # autobuild tag + sha256 so the toolchain is fixed and verified; MP4Box
        # (gpac) still comes from apt. Bump BUILD/FF/SHA together to update.
        run: |
          sudo apt-get update && sudo apt-get install -y gpac
          FF=ffmpeg-n8.1.2-22-g94138f6973-linux64-gpl-8.1
          BUILD=autobuild-2026-07-15-14-01
          SHA=68e304f5518d3e22cd825e6fb738d0d9a04a8f36127873a18fc6646457e95b92
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/${BUILD}/${FF}.tar.xz" -o /tmp/ffmpeg.tar.xz
          echo "${SHA}  /tmp/ffmpeg.tar.xz" | sha256sum -c -
          sudo tar -xJf /tmp/ffmpeg.tar.xz --strip-components=2 -C /usr/local/bin "${FF}/bin/ffmpeg" "${FF}/bin/ffprobe"
          ffmpeg -version | head -1

      - name: Install dovi_tool + hdr10plus_tool
        run: |
          DOVI_VERSION=2.3.3
          curl -fsSL "https://github.com/quietvoid/dovi_tool/releases/download/${DOVI_VERSION}/dovi_tool-${DOVI_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          HDR10PLUS_VERSION=1.7.2
          curl -fsSL "https://github.com/quietvoid/hdr10plus_tool/releases/download/${HDR10PLUS_VERSION}/hdr10plus_tool-${HDR10PLUS_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          dovi_tool --version
          hdr10plus_tool --version
          MP4Box -version 2>&1 | head -1

      - name: Generate (fast smoke config)
        run: |
          chmod +x generate.sh
          ./generate.sh --config fixtures.ci.toml

      - name: Check for generation failures
        # The HDR/colour recipes self-verify their boxes and log FAILED on a
        # mismatch (see lib/hdr.sh), so this generic check covers them too.
        run: |
          if grep -q "FAILED" output/generate.log; then
            echo "::error::a fixture failed to generate"
            grep -nE "→ |FAILED" output/generate.log
            exit 1
          fi
          # SKIP is fine (optional codecs like aac_he/libfdk_aac not in the build).
          grep -c "SKIP" output/generate.log | xargs echo "skipped (optional codecs):"
          count=$(ls output/*.mp4 | wc -l)
          echo "generated $count fixtures"
          if [ "$count" -lt 40 ]; then
            echo "::error::expected at least 40 fixtures, got $count"
            exit 1
          fi
